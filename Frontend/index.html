<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="hero">
    <h1>🚀 AI Resume Analyzer</h1>
    <p>Get instant job match insights & skill gaps</p>
</div>

<div class="upload-container">
    <div class="upload-card" onclick="triggerFile()">
        <p>📂 Drag & Drop Resume</p>
        <p>or Click to Upload</p>
        <input type="file" id="resume" hidden>
    </div>

    <button onclick="upload()">Analyze Resume</button>
</div>

<div id="loader" class="loader hidden"></div>

<div class="dashboard">
    <div id="score"></div>
    <div id="skills"></div>
    <div id="jobs"></div>
</div>

<script src="script.js"></script>

</body>
</html>
